apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: ollama
  namespace: ollama
  labels:
    app.kubernetes.io/name: ollama
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ollama
  updatePolicy:
    updateMode: InPlaceOrRecreate
  resourcePolicy:
    containerPolicies:
      - containerName: ollama
        minAllowed:
          cpu: 500m
          memory: 2Gi
        maxAllowed:
          cpu: "6"
          memory: 12Gi
        controlledResources:
          - cpu
          - memory
        controlledValues: RequestsAndLimits
