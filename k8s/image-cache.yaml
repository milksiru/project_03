apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ollama-image-cache
  namespace: ollama
  labels:
    app.kubernetes.io/name: ollama-image-cache
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: ollama-image-cache
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ollama-image-cache
    spec:
      initContainers:
        - name: pull-ollama
          image: 192.168.55.139:5050/ollama/ollama:0.12.9
          imagePullPolicy: Always
          command: ["/bin/ollama", "--version"]
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.10
          resources:
            requests:
              cpu: 1m
              memory: 4Mi
            limits:
              cpu: 10m
              memory: 16Mi
